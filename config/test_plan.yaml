# PVT test plan.
#   P (process)     -> multiple identical units (unit IDs below)
#   V (voltage)     -> Vin sweep points
#   T (temperature) -> rough temperature points you can hit
#                       (fridge ~5C, room ~25C, hair-dryer ~50C)

units: ["U1", "U2", "U3"]          # measure all; spot-check extras at nominal

temperatures_c: [5, 25, 50]

# Vin sweep used for line regulation / dropout. The DUT input is set via the
# adjustable buck; read the true value with the DMM.
vin_points: [6.0, 7.0, 8.0, 9.0, 10.0, 11.0, 12.0]

# Rails to validate (must exist in dut_qc3.yaml). 9V/12V require the QC trigger
# board to negotiate; 5V is the default rail.
rails: ["5V", "9V", "12V"]

# Dropout search parameters
dropout:
  vin_start: 8.0
  vin_min: 4.0
  step: 0.25
